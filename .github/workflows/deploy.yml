name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      feed_ref:
        description: Branch, tag, or commit from Gnaroshi/gnaroshi-content-feed
        required: true
        default: main
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Checkout public content feed
        uses: actions/checkout@v7
        with:
          repository: Gnaroshi/gnaroshi-content-feed
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.feed_ref || 'main' }}
          path: .content-feed
          persist-credentials: false

      - name: Record content feed commit
        run: echo "CONTENT_FEED_COMMIT=$(git -C .content-feed rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate public content feed
        run: npm run content:check

      - name: Build Astro site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
