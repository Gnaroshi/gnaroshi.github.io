name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      feed_ref:
        description: Branch, tag, or commit from Gnaroshi/gnaroshi-content-feed
        required: true
        default: main
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Checkout public content feed
        uses: actions/checkout@v7
        with:
          repository: Gnaroshi/gnaroshi-content-feed
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.feed_ref || 'main' }}
          path: .content-feed
          persist-credentials: false

      - name: Record content feed commit
        run: |
          echo "CONTENT_FEED_COMMIT=$(git -C .content-feed rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "WEBSITE_COMMIT=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate public content feed
        run: npm run content:check

      - name: Build Astro site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  verify:
    name: Verify deployed commit
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Match live build metadata to this deployment
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
          BUILD_INFO_URL: https://gnaroshi.dev/build-info.json
        run: |
          for attempt in $(seq 1 18); do
            deployed_commit=$(curl --fail --silent --show-error --location --header "Cache-Control: no-cache" "${BUILD_INFO_URL}?expected=${EXPECTED_COMMIT}" | jq -r '.websiteCommit // empty') || true
            if [ "${deployed_commit}" = "${EXPECTED_COMMIT}" ]; then
              echo "Verified website commit ${deployed_commit}"
              exit 0
            fi
            echo "Attempt ${attempt}: expected ${EXPECTED_COMMIT}, received ${deployed_commit:-unavailable}"
            sleep 10
          done
          echo "Deployed build metadata did not match ${EXPECTED_COMMIT}" >&2
          exit 1
