name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      feed_ref:
        description: Human-friendly branch, tag, or commit from the public content feed
        required: false
        default: main
        type: string
      feed_commit:
        description: Optional exact 40-character content-feed commit; takes precedence over feed_ref
        required: false
        default: ""
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  build:
    name: Build and validate production artifact
    runs-on: ubuntu-latest
    outputs:
      website_commit: ${{ steps.provenance.outputs.website_commit }}
      content_feed_commit: ${{ steps.provenance.outputs.content_feed_commit }}
      content_hash: ${{ steps.provenance.outputs.content_hash }}
      feed_schema_version: ${{ steps.provenance.outputs.feed_schema_version }}
    steps:
      - name: Checkout website
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Checkout requested public content feed
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: Gnaroshi/gnaroshi-content-feed
          ref: ${{ inputs.feed_commit || inputs.feed_ref || 'main' }}
          path: .content-feed
          persist-credentials: false

      - name: Pin and record build provenance
        id: provenance
        env:
          REQUESTED_FEED_COMMIT: ${{ inputs.feed_commit || '' }}
        run: |
          website_commit=$(git rev-parse HEAD)
          content_feed_commit=$(git -C .content-feed rev-parse HEAD)
          content_hash=$(jq -r '.contentHash // empty' .content-feed/manifest.json)
          feed_schema_version=$(jq -r '.schemaVersion // empty' .content-feed/manifest.json)

          if [ -n "${REQUESTED_FEED_COMMIT}" ]; then
            if ! [[ "${REQUESTED_FEED_COMMIT}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "feed_commit must be an exact lowercase 40-character SHA" >&2
              exit 1
            fi
            if [ "${content_feed_commit}" != "${REQUESTED_FEED_COMMIT}" ]; then
              echo "Requested feed ${REQUESTED_FEED_COMMIT}, checked out ${content_feed_commit}" >&2
              exit 1
            fi
          fi

          if ! [[ "${content_hash}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Feed manifest contentHash is missing or malformed" >&2
            exit 1
          fi
          if [ "${feed_schema_version}" != "1" ]; then
            echo "Unsupported feed schema ${feed_schema_version}" >&2
            exit 1
          fi

          echo "WEBSITE_COMMIT=${website_commit}" >> "${GITHUB_ENV}"
          echo "CONTENT_FEED_COMMIT=${content_feed_commit}" >> "${GITHUB_ENV}"
          echo "BUILD_TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_ENV}"
          echo "DEPLOYMENT_ENVIRONMENT=production" >> "${GITHUB_ENV}"
          echo "website_commit=${website_commit}" >> "${GITHUB_OUTPUT}"
          echo "content_feed_commit=${content_feed_commit}" >> "${GITHUB_OUTPUT}"
          echo "content_hash=${content_hash}" >> "${GITHUB_OUTPUT}"
          echo "feed_schema_version=${feed_schema_version}" >> "${GITHUB_OUTPUT}"

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for production smoke tests
        run: npx playwright install --with-deps chromium

      - name: Prepare diagnostic logs
        run: mkdir -p artifacts/ci-logs

      - name: Validate content feed
        run: npm run content:check 2>&1 | tee artifacts/ci-logs/content-check.log

      - name: Test website against feed contract fixtures
        env:
          CONTENT_FEED_CONTRACT_PATH: .content-feed
        run: npm run test:feed-contract 2>&1 | tee artifacts/ci-logs/feed-fixtures.log

      - name: Type-check Astro application
        run: npm run check 2>&1 | tee artifacts/ci-logs/astro-check.log

      - name: Build static site
        run: npm run build 2>&1 | tee artifacts/ci-logs/build.log

      - name: Validate localization
        run: npm run check:i18n 2>&1 | tee artifacts/ci-logs/i18n.log

      - name: Validate generated links
        run: npm run check:links 2>&1 | tee artifacts/ci-logs/links.log

      - name: Run focused production smoke tests
        env:
          PLAYWRIGHT_USE_EXISTING_BUILD: "1"
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report/smoke
          PLAYWRIGHT_OUTPUT_DIR: test-results/smoke
        run: npm run test:smoke 2>&1 | tee artifacts/ci-logs/smoke.log

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: dist

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: deploy-failure-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            artifacts/ci-logs/
            playwright-report/
            test-results/

  deploy:
    name: Deploy exact Pages artifact
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  verify:
    name: Verify live production provenance and routes
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout verification tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify deployed site
        env:
          DEPLOYMENT_URL: https://gnaroshi.dev
          EXPECTED_WEBSITE_COMMIT: ${{ needs.build.outputs.website_commit }}
          EXPECTED_CONTENT_FEED_COMMIT: ${{ needs.build.outputs.content_feed_commit }}
          EXPECTED_CONTENT_HASH: ${{ needs.build.outputs.content_hash }}
          EXPECTED_WORKFLOW_RUN_ID: ${{ github.run_id }}
          EXPECTED_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          EXPECTED_ENVIRONMENT: production
        run: node scripts/verify-deployment.mjs

      - name: Record deployment URL
        run: |
          echo "Deployment URL: ${{ needs.deploy.outputs.page_url }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "Custom domain: https://gnaroshi.dev" >> "${GITHUB_STEP_SUMMARY}"
          echo "Website commit: ${{ needs.build.outputs.website_commit }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "Content feed commit: ${{ needs.build.outputs.content_feed_commit }}" >> "${GITHUB_STEP_SUMMARY}"
