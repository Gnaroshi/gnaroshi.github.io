name: Roll back public website deployment

on:
  workflow_dispatch:
    inputs:
      website_ref:
        description: Exact website commit or immutable tag to deploy
        required: true
        type: string
      feed_commit:
        description: Exact 40-character public content-feed commit
        required: true
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  build:
    name: Rebuild exact public inputs
    runs-on: ubuntu-latest
    outputs:
      website_commit: ${{ steps.provenance.outputs.website_commit }}
      content_feed_commit: ${{ steps.provenance.outputs.content_feed_commit }}
      content_hash: ${{ steps.provenance.outputs.content_hash }}
    steps:
      - name: Checkout current deployment tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: main
          path: .deployment-tooling

      - name: Checkout requested website
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.website_ref }}
          path: site

      - name: Checkout exact public content feed
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: Gnaroshi/gnaroshi-content-feed
          ref: ${{ inputs.feed_commit }}
          path: site/.content-feed
          persist-credentials: false

      - name: Validate and record rollback provenance
        id: provenance
        env:
          REQUESTED_FEED_COMMIT: ${{ inputs.feed_commit }}
        run: |
          website_commit=$(git -C site rev-parse HEAD)
          content_feed_commit=$(git -C site/.content-feed rev-parse HEAD)
          content_hash=$(jq -r '.contentHash // empty' site/.content-feed/manifest.json)

          if ! [[ "${REQUESTED_FEED_COMMIT}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "feed_commit must be an exact lowercase 40-character SHA" >&2
            exit 1
          fi
          if [ "${content_feed_commit}" != "${REQUESTED_FEED_COMMIT}" ]; then
            echo "Requested feed ${REQUESTED_FEED_COMMIT}, checked out ${content_feed_commit}" >&2
            exit 1
          fi
          if ! [[ "${content_hash}" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Feed manifest contentHash is missing or malformed" >&2
            exit 1
          fi
          if [ "$(jq -r '.schemaVersion // empty' site/.content-feed/manifest.json)" != "1" ]; then
            echo "Rollback feed uses an unsupported schema" >&2
            exit 1
          fi

          echo "WEBSITE_COMMIT=${website_commit}" >> "${GITHUB_ENV}"
          echo "CONTENT_FEED_COMMIT=${content_feed_commit}" >> "${GITHUB_ENV}"
          echo "BUILD_TIMESTAMP=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_ENV}"
          echo "DEPLOYMENT_ENVIRONMENT=production" >> "${GITHUB_ENV}"
          echo "website_commit=${website_commit}" >> "${GITHUB_OUTPUT}"
          echo "content_feed_commit=${content_feed_commit}" >> "${GITHUB_OUTPUT}"
          echo "content_hash=${content_hash}" >> "${GITHUB_OUTPUT}"

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: site/.node-version
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Install Chromium
        working-directory: site
        run: npx playwright install --with-deps chromium

      - name: Prepare diagnostic logs
        working-directory: site
        run: mkdir -p artifacts/ci-logs

      - name: Run rollback validation
        working-directory: site
        run: |
          npm run content:check 2>&1 | tee artifacts/ci-logs/content-check.log
          npm run check 2>&1 | tee artifacts/ci-logs/astro-check.log
          npm run build 2>&1 | tee artifacts/ci-logs/build.log
          npm run check:i18n 2>&1 | tee artifacts/ci-logs/i18n.log
          npm run check:links 2>&1 | tee artifacts/ci-logs/links.log

      - name: Run focused smoke tests when supported by the target
        working-directory: site
        env:
          PLAYWRIGHT_USE_EXISTING_BUILD: "1"
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report/smoke
          PLAYWRIGHT_OUTPUT_DIR: test-results/smoke
        run: npm run --if-present test:smoke 2>&1 | tee artifacts/ci-logs/smoke.log

      - name: Write versioned rollback provenance
        run: node .deployment-tooling/scripts/write-build-info.mjs --site-dir site

      - name: Require deterministic build provenance contract
        working-directory: site
        run: |
          node -e 'const info=require("./dist/build-info.json"); if(info.schemaVersion!==1||info.websiteCommit!==process.env.WEBSITE_COMMIT||info.contentFeedCommit!==process.env.CONTENT_FEED_COMMIT||info.environment!=="production") process.exit(1)'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload rollback Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site/dist

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rollback-failure-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            site/artifacts/ci-logs/
            site/playwright-report/
            site/test-results/

  deploy:
    name: Deploy rollback artifact
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

  verify:
    name: Verify rollback provenance and routes
    needs: [build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout verification tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify deployed rollback
        env:
          DEPLOYMENT_URL: https://gnaroshi.dev
          EXPECTED_WEBSITE_COMMIT: ${{ needs.build.outputs.website_commit }}
          EXPECTED_CONTENT_FEED_COMMIT: ${{ needs.build.outputs.content_feed_commit }}
          EXPECTED_CONTENT_HASH: ${{ needs.build.outputs.content_hash }}
          EXPECTED_WORKFLOW_RUN_ID: ${{ github.run_id }}
          EXPECTED_WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          EXPECTED_ENVIRONMENT: production
          SKIP_NAVIGATION_SIGNATURE: "true"
        run: node scripts/verify-deployment.mjs

      - name: Record rollback result
        run: |
          echo "Rollback deployment URL: ${{ needs.deploy.outputs.page_url }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "Website commit: ${{ needs.build.outputs.website_commit }}" >> "${GITHUB_STEP_SUMMARY}"
          echo "Content feed commit: ${{ needs.build.outputs.content_feed_commit }}" >> "${GITHUB_STEP_SUMMARY}"
