name: Performance budget report

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Checkout public content feed
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: Gnaroshi/gnaroshi-content-feed
          ref: main
          path: .content-feed
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies and Chromium
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run deterministic and browser budgets
        run: npm run test:performance

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: performance-${{ github.run_id }}
          retention-days: 7
          path: |
            playwright-report/
            test-results/
