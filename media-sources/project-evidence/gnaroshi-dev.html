<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>gnaroshi.dev evidence composition</title>
  <style>
    :root { font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; background:#e9ede8; color:#17201b; }
    * { box-sizing:border-box; }
    body { margin:0; width:1600px; height:1000px; padding:54px; background:#e9ede8; }
    main { height:100%; display:grid; grid-template-rows:auto 1fr; gap:24px; }
    header { display:flex; justify-content:space-between; align-items:end; border-bottom:2px solid #17201b; padding-bottom:20px; }
    h1 { margin:0; font-size:45px; } header p { margin:0; color:#57635c; font-size:19px; }
    .layout { display:grid; grid-template-columns:1.8fr .62fr .86fr; gap:22px; min-height:0; }
    figure, section { margin:0; min-width:0; overflow:hidden; border:1px solid #b8c2ba; background:#f8faf6; }
    figure { display:grid; grid-template-rows:1fr auto; }
    figure img { width:100%; height:100%; min-height:0; object-fit:cover; object-position:top; display:block; }
    figcaption, section { padding:16px 18px; color:#4f5d55; font-size:16px; }
    .mobile img { object-fit:cover; object-position:top center; }
    section { align-self:end; border-top:4px solid #2e6b51; }
    h2 { margin:0 0 14px; color:#2e6b51; font-size:16px; text-transform:uppercase; }
    pre { margin:0; font:15px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace; white-space:pre-wrap; color:#26332c; }
  </style>
</head>
<body>
  <main>
    <header><div><p>Actual rendered interface</p><h1>gnaroshi.dev</h1></div><p>desktop · Korean mobile · build provenance</p></header>
    <div class="layout">
      <figure><img src="../evidence/gnaroshi-dev/home-desktop.png" alt="" /><figcaption>English desktop homepage · local production-equivalent build</figcaption></figure>
      <figure class="mobile"><img src="../evidence/gnaroshi-dev/home-ko-mobile.png" alt="" /><figcaption>Korean mobile homepage · 390 × 844 at 2×</figcaption></figure>
      <section><h2>Build verification</h2><pre id="build-info">schemaVersion: 1
environment: local media review
contentFeed:
  schemaVersion: 1
  state: bootstrap-empty
routes:
  / · /ko/
  /research/
  /projects/</pre></section>
    </div>
  </main>
</body>
</html>
